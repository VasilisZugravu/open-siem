{% extends "base.html" %}
{% block title %}Sign in — SIEM{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card" data-animate>
    <div class="login-title">Sign in</div>
    <div class="login-subtitle">SOC Dashboard</div>
    <form method="post" data-loading-btn>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" autofocus autocomplete="username">
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}

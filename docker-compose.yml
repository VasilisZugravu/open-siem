services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem
      POSTGRES_DB: siem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://siem:siem@db:5432/siem
    ports:
      - "5000:5000"
    depends_on:
      - db

volumes:
  pgdata:

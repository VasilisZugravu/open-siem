services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem
      POSTGRES_DB: siem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://siem:siem@db:5432/siem
      SECRET_KEY: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme
      INGEST_API_KEY: changeme
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    # ADMIN_USERNAME/ADMIN_PASSWORD are read directly from the environment by
    # the create-admin CLI's envvar options — keep them out of the shell
    # command string so a password with spaces/metacharacters can't break
    # word-splitting or be interpreted as shell syntax.
    command: >
      sh -c "flask --app run create-admin && python run.py"

volumes:
  pgdata:

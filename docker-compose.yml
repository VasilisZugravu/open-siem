services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siem
      POSTGRES_DB: siem
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://siem:siem@db:5432/siem
      SECRET_KEY: change-me-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme
      INGEST_API_KEY: changeme
    ports:
      - "5000:5000"
    depends_on:
      - db
    command: >
      sh -c "flask --app run create-admin --username $$ADMIN_USERNAME --password $$ADMIN_PASSWORD &&
             python run.py"

volumes:
  pgdata:
